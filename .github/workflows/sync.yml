name: CalDAV Sync To Feishu Base

on:
  schedule:
    # GitHub Actions cron uses UTC:
    # Asia/Shanghai 12:00 / 15:00 / 18:00 => UTC 04:00 / 07:00 / 10:00
    - cron: "0 4,7,10 * * 1-5"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build .env from single secret
        run: |
          printf "%s" "${{ secrets.SYNC_ENV }}" > .env
          test -s .env

      - name: Sync workflow
        run: python main.py --workflow
